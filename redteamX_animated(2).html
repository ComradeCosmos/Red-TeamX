<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>redteamX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', 'Courier New', monospace;
    overflow: hidden;
    background: #0c0c0c;
  }

  /* ── TEXTURED BACKGROUND ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-color: #0c0c0c;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size:
      24px 24px,
      24px 24px,
      96px 96px,
      96px 96px;
  }

  /* Vignette */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 25%,
      rgba(0,0,0,0.5) 65%,
      rgba(0,0,0,0.88) 100%
    );
  }

  /* Diagonal stripes */
  .stripes {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.007) 18px,
      rgba(255,255,255,0.007) 19px
    );
    pointer-events: none;
  }

  /* ── LOGO ── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards 0.1s;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── LETTERS ── */
  .wordmark {
    display: flex;
    align-items: center;
  }

  .letter {
    font-size: clamp(36px, 5.5vw, 56px);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #e2e2e2;
    opacity: 0;
    transform: translateY(16px);
    animation: letterUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    display: inline-block;
  }

  /* R=1, E=2, D=3, spacer=4, T=5, E=6, A=7, M=8 */
  .letter:nth-child(1) { animation-delay: 0.25s; }
  .letter:nth-child(2) { animation-delay: 0.33s; }
  .letter:nth-child(3) { animation-delay: 0.41s; }
  .letter:nth-child(5) { animation-delay: 0.57s; }
  .letter:nth-child(6) { animation-delay: 0.65s; }
  .letter:nth-child(7) { animation-delay: 0.73s; }
  .letter:nth-child(8) { animation-delay: 0.81s; }

  .spacer { display: inline-block; width: 0.45em; }

  @keyframes letterUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── TARGET ICON ── */
  .target-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 0.35em;
    opacity: 0;
    animation: targetReveal 0.65s cubic-bezier(0.34, 1.4, 0.64, 1) forwards 1.05s;
  }

  @keyframes targetReveal {
    0%  { opacity: 0; transform: scale(0.4) rotate(-30deg); }
    100%{ opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .target-svg {
    width: clamp(40px, 5.8vw, 60px);
    height: clamp(40px, 5.8vw, 60px);
    overflow: visible;
  }

  .ring-outer {
    stroke-dasharray: 226;
    stroke-dashoffset: 226;
    animation: drawRing 0.9s ease forwards 1.2s;
  }
  .ring-inner {
    stroke-dasharray: 176;
    stroke-dashoffset: 176;
    animation: drawRing 0.75s ease forwards 1.35s;
  }
  @keyframes drawRing { to { stroke-dashoffset: 0; } }

  .tick {
    opacity: 0;
    animation: tickIn 0.25s ease forwards;
  }
  .tick:nth-child(1) { animation-delay: 1.85s; }
  .tick:nth-child(2) { animation-delay: 1.95s; }
  .tick:nth-child(3) { animation-delay: 2.0s; }
  .tick:nth-child(4) { animation-delay: 2.05s; }

  @keyframes tickIn {
    0%  { opacity: 0; transform: scale(0); }
    100%{ opacity: 0.85; transform: scale(1); }
  }

  .x-line {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: drawX 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .x-line:nth-child(1) { animation-delay: 1.65s; }
  .x-line:nth-child(2) { animation-delay: 1.8s; }

  @keyframes drawX { to { stroke-dashoffset: 0; } }

  .underline {
    position: absolute;
    bottom: -16px;
    left: 0;
    height: 1px;
    background: rgba(255,255,255,0.22);
    width: 0;
    animation: ruleGrow 0.7s ease forwards 1.4s;
  }
  @keyframes ruleGrow { to { width: 100%; } }

  @keyframes flicker {
    0%, 89%, 100% { opacity: 1; }
    90%  { opacity: 0.35; }
    91%  { opacity: 1; }
    95%  { opacity: 0.65; }
    96%  { opacity: 1; }
  }
  .x-glow-group {
    animation: flicker 7s ease-in-out infinite 2.8s;
  }

</style>
</head>
<body>

  <div class="bg"></div>
  <div class="stripes"></div>

  <div class="logo-wrap">
    <div class="wordmark">
      <span class="letter">R</span>
      <span class="letter">E</span>
      <span class="letter">D</span>
      <span class="spacer"></span>
      <span class="letter">T</span>
      <span class="letter">E</span>
      <span class="letter">A</span>
      <span class="letter">M</span>
    </div>

    <div class="target-wrap">
      <svg class="target-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <defs>
          <filter id="xGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="6" result="b1"/>
            <feGaussianBlur stdDeviation="2.5" result="b2"/>
            <feMerge>
              <feMergeNode in="b1"/>
              <feMergeNode in="b2"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="ringF" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <circle class="ring-outer" cx="30" cy="30" r="28"
                stroke="rgba(255,255,255,0.07)" stroke-width="0.6" fill="none"/>
        <circle class="ring-inner" cx="30" cy="30" r="22"
                stroke="#ff2020" stroke-width="0.9" fill="none"
                filter="url(#ringF)" opacity="0.6"/>
        <circle cx="30" cy="30" r="17" fill="#131313"/>

        <line x1="30" y1="8" x2="30" y2="52" stroke="white" stroke-width="0.3" opacity="0.05"/>
        <line x1="8" y1="30" x2="52" y2="30" stroke="white" stroke-width="0.3" opacity="0.05"/>

        <g class="tick" style="transform-origin: 30px 4px">
          <line x1="30" y1="1" x2="30" y2="8" stroke="#ff2020" stroke-width="1.3"/>
        </g>
        <g class="tick" style="transform-origin: 30px 56px">
          <line x1="30" y1="52" x2="30" y2="59" stroke="#ff2020" stroke-width="1.3"/>
        </g>
        <g class="tick" style="transform-origin: 4px 30px">
          <line x1="1" y1="30" x2="8" y2="30" stroke="#ff2020" stroke-width="1.3"/>
        </g>
        <g class="tick" style="transform-origin: 56px 30px">
          <line x1="52" y1="30" x2="59" y2="30" stroke="#ff2020" stroke-width="1.3"/>
        </g>

        <g class="x-glow-group" filter="url(#xGlow)">
          <line class="x-line" x1="17" y1="17" x2="43" y2="43"
                stroke="#ff2020" stroke-width="3.4" stroke-linecap="round"/>
          <line class="x-line" x1="43" y1="17" x2="17" y2="43"
                stroke="#ff2020" stroke-width="3.4" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <div class="underline"></div>
  </div>

</body>
</html>
